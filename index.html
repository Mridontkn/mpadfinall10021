<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PUZZLE 2 // SEARCH FLOOR</title>
<style>
  :root{
    --bg: #061016;
    --panel: rgba(3, 7, 10, 0.74);
    --line: rgba(140, 255, 205, 0.42);
    --text: rgba(220, 255, 244, 0.92);
    --muted: rgba(220, 255, 244, 0.68);
    --accent: rgba(255, 210, 130, 0.92);
    --ok: rgba(150, 255, 190, 0.95);
    --bad: rgba(255, 120, 140, 0.95);
  }

  html, body {
    margin: 0;
    height: 100%;
    font-family: "Courier New", Courier, monospace;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    image-rendering: pixelated;
  }

  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
  }

  .panel {
    border: 1px solid var(--line);
    background: var(--panel);
    padding: 12px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.45) inset;
  }

  .frame {
    position: absolute;
    top: 14px;
    left: 14px;
    width: min(420px, calc(100% - 28px));
  }

  .title {
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-size: 13px;
    margin: 0 0 8px 0;
  }

  .small {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.4;
  }

  .kbd {
    display: inline-block;
    border: 1px solid var(--line);
    padding: 0 6px;
    line-height: 18px;
    height: 18px;
    margin: 0 2px;
    font-size: 12px;
    color: var(--text);
  }

  #padlockPanel {
    position: absolute;
    right: 14px;
    top: 14px;
    width: min(420px, calc(100% - 28px));
    pointer-events: auto;
  }

  .padRow {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: center;
    margin-top: 10px;
  }

  input[type="text"]{
    width: 100%;
    font: inherit;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    outline: none;
  }

  button {
    font: inherit;
    padding: 10px 12px;
    border: 1px solid var(--line);
    background: transparent;
    color: var(--text);
    cursor: pointer;
  }
  button:active { transform: translateY(1px); }

  .status {
    margin-top: 10px;
    min-height: 18px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    color: var(--muted);
  }

  .modalBack {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  pointer-events: auto;

  overflow-y: auto; /* allows scrolling if needed */
  }

.modal {
  position: relative;
  margin: 40px auto;
  width: min(900px, 95%);
  
  border: 1px solid var(--line);
  background: rgba(0, 0, 0, 0.92);
  padding: 18px;

  display: flex;
  flex-direction: column;
  gap: 14px;
}

  .modalHeader {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    border-bottom: 1px dashed rgba(140,255,205,0.25);
    padding-bottom: 10px;
    margin-bottom: 10px;
  }

  .modalHeader .h {
    margin: 0;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-size: 13px;
  }

  .modalHeader .x {
    font-size: 12px;
    color: var(--muted);
  }

  .docText {
    white-space: pre-wrap;
    line-height: 1.55;
    font-size: 14px;
    color: var(--text);
  }

  .docFooter {
    margin-top: 10px;
    border-top: 1px dashed rgba(140,255,205,0.25);
    padding-top: 10px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  #scan {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.00),
        rgba(255,255,255,0.00) 2px,
        rgba(255,255,255,0.03) 3px
      );
    opacity: 0.35;
    mix-blend-mode: overlay;
  }

  @media (prefers-reduced-motion: no-preference) {
    #scan { animation: flicker 3.2s infinite; }
    @keyframes flicker {
      0%, 100% { opacity: 0.18; }
      45% { opacity: 0.38; }
      52% { opacity: 0.12; }
      70% { opacity: 0.33; }
    }
  }
</style>
</head>

<body>
<canvas id="game" width="960" height="540"></canvas>
<div id="scan"></div>

<div id="ui">
  <div class="frame panel">
    <p class="title">SEARCH FLOOR // ABANDONED LAB</p>
    <div class="small">
      Move: <span class="kbd">W</span><span class="kbd">A</span><span class="kbd">S</span><span class="kbd">D</span>
      &nbsp;&nbsp;Read: <span class="kbd">E</span>
      &nbsp;&nbsp;Close: <span class="kbd">ESC</span><br/>
      The slips are here. They’re not easy to see.
    </div>
  </div>

  <div id="padlockPanel" class="panel">
    <p class="title">PADLOCK</p>
    <div class="small">Enter the 4-digit code.</div>
    <div class="padRow">
      <input id="codeInput" type="text" inputmode="numeric" autocomplete="off" maxlength="4" placeholder="____" />
      <button id="unlockBtn">UNLOCK</button>
    </div>
    <div id="lockStatus" class="status"></div>
  </div>

  <div id="modalBack" class="modalBack" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modalHeader">
        <p class="h" id="modalTitle">DOCUMENT</p>
        <div class="x">Press <span class="kbd">ESC</span> to close</div>
      </div>
      <div id="modalBody" class="docText"></div>
      <div id="modalFooter" class="docFooter" style="display:none;"></div>
    </div>
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);

  const ORDINAL_TO_DIGIT = {
    "FIRST":"1","SECOND":"2","THIRD":"3","FOURTH":"4",
    "FIFTH":"5","SIXTH":"6","SEVENTH":"7","EIGHTH":"8","NINTH":"9"
  };

  const canvas = $("game");
  const ctx = canvas.getContext("2d");

  const VIEW_W = canvas.width;
  const VIEW_H = canvas.height;

  const WORLD_W = 2200;
  const WORLD_H = 1400;

  const player = { x: 180, y: 180, r: 10, speed: 2.4 };
  const cam = { x: 0, y: 0 };

  const keys = new Set();
  let paused = false;

  function clamp(v,a,b){ return Math.max(a, Math.min(b,v)); }
  function dist2(ax, ay, bx, by){ const dx=ax-bx, dy=ay-by; return dx*dx+dy*dy; }

  // Obstacles
  const obstacles = [
    { x: 240, y: 220, w: 520, h: 40 },
    { x: 240, y: 320, w: 520, h: 40 },
    { x: 240, y: 420, w: 520, h: 40 },
    { x: 980, y: 220, w: 680, h: 44 },
    { x: 980, y: 340, w: 680, h: 44 },
    { x: 980, y: 460, w: 680, h: 44 },

    { x: 420, y: 720, w: 120, h: 120 },
    { x: 590, y: 740, w: 140, h: 160 },
    { x: 820, y: 760, w: 120, h: 120 },

    { x: 1360, y: 820, w: 180, h: 180 },
    { x: 1620, y: 860, w: 140, h: 140 },

    { x: 1800, y: 220, w: 120, h: 320 },
    { x: 1940, y: 220, w: 120, h: 320 },

    { x: 240, y: 1040, w: 420, h: 70 },
    { x: 760, y: 1040, w: 420, h: 70 },
  ];

  // Papers moved to reachable positions (not behind shelves / not inside clutter)
  const papers = [
    // in an aisle endcap (reachable)
    { id:"p1", x: 760,  y: 390, ordinal:"SECOND", posIndex:3,
      sentence:"This is the SECOND day of testing.", logged:false },

    // near front of the right shelf row (reachable)
    { id:"p2", x: 980,  y: 520, ordinal:"FOURTH", posIndex:1,
      sentence:"A FOURTH checksum passed. Nothing else did.", logged:false },

    // near server racks but not trapped (reachable)
    { id:"p3", x: 1765, y: 560, ordinal:"FIRST",  posIndex:2,
      sentence:"He said the FIRST rule was to read beginnings.", logged:false },

    // next to table corner (reachable)
    { id:"p4", x: 720,  y: 1005, ordinal:"THIRD",  posIndex:4,
      sentence:"The THIRD door was open when I arrived.", logged:false },
  ];

  const found = { 1:null,2:null,3:null,4:null };

  // ---------- Modal ----------
  const modalBack = $("modalBack");
  const modalTitle = $("modalTitle");
  const modalBody = $("modalBody");
  const modalFooter = $("modalFooter");

function openModal(title, body, footerLeft="", footerRight="") {
  modalTitle.textContent = title;

  // Add text + image placeholder
  modalBody.innerHTML = `
    <div style="white-space: pre-wrap;">${body}</div>
    
    <div style="margin-top: 16px; text-align: center;">
      <img src="IMG_20260330_185158.jpg" 
           alt="Document Image"
           style="max-width: 100%; border: 1px solid rgba(140,255,205,0.4);">
    </div>
  `;
    if (footerLeft || footerRight) {
      modalFooter.style.display = "flex";
      modalFooter.innerHTML = `<div>${footerLeft}</div><div>${footerRight}</div>`;
    } else {
      modalFooter.style.display = "none";
      modalFooter.innerHTML = "";
    }
    modalBack.style.display = "block";
    modalBack.setAttribute("aria-hidden", "false");
    paused = true;
  }
  function closeModal() {
    modalBack.style.display = "none";
    modalBack.setAttribute("aria-hidden", "true");
    paused = false;
  }

  // ---------- Input ----------
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape") {
      if (modalBack.style.display === "block") closeModal();
      return;
    }
    keys.add(e.key.toLowerCase());
    if (["w","a","s","d"].includes(e.key.toLowerCase())) e.preventDefault();
  });
  window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

  // ---------- Collision (push-out resolver prevents sticking) ----------
  function resolveCircleRect(cx, cy, r, rx, ry, rw, rh) {
    // nearest point on rect
    const nx = clamp(cx, rx, rx + rw);
    const ny = clamp(cy, ry, ry + rh);

    let dx = cx - nx;
    let dy = cy - ny;
    const d2 = dx*dx + dy*dy;

    if (d2 >= r*r) return { x: cx, y: cy, hit: false };

    // If exactly on edge/corner, pick a stable push direction
    if (d2 === 0) {
      // push out based on which side is closer
      const left = Math.abs(cx - rx);
      const right = Math.abs((rx + rw) - cx);
      const top = Math.abs(cy - ry);
      const bottom = Math.abs((ry + rh) - cy);
      const m = Math.min(left, right, top, bottom);
      if (m === left) dx = -1, dy = 0;
      else if (m === right) dx = 1, dy = 0;
      else if (m === top) dx = 0, dy = -1;
      else dx = 0, dy = 1;
    }

    const d = Math.sqrt(dx*dx + dy*dy);
    const push = (r - d) + 0.01; // tiny bias prevents re-collision jitter
    const px = (dx / d) * push;
    const py = (dy / d) * push;

    return { x: cx + px, y: cy + py, hit: true };
  }

  function moveAndCollide(dx, dy) {
    // first apply movement + bounds
    let nx = clamp(player.x + dx, player.r, WORLD_W - player.r);
    let ny = clamp(player.y + dy, player.r, WORLD_H - player.r);

    // iterative push-out against obstacles (prevents corner sticking)
    for (let iter = 0; iter < 4; iter++) {
      let any = false;
      for (const o of obstacles) {
        const res = resolveCircleRect(nx, ny, player.r, o.x, o.y, o.w, o.h);
        if (res.hit) {
          nx = res.x; ny = res.y;
          any = true;
        }
      }
      if (!any) break;
    }

    player.x = nx;
    player.y = ny;
  }

  // ---------- Interaction ----------
  function nearestPaperInRange() {
    // tight range => must get close (and cannot read through shelves)
    const RANGE2 = 20 * 20;
    let best = null, bestD = Infinity;
    for (const p of papers) {
      const d = dist2(player.x, player.y, p.x, p.y);
      if (d < RANGE2 && d < bestD) { best = p; bestD = d; }
    }
    return best;
  }

  let eLatch = false;
  function handleInteract() {
    const wantE = keys.has("e");
    if (wantE && !eLatch && !paused) {
      eLatch = true;
      const p = nearestPaperInRange();
      if (!p) return;

      if (!p.logged) {
        const digit = ORDINAL_TO_DIGIT[p.ordinal] ?? "?";
        found[p.posIndex] = digit;
        p.logged = true;
      }

      openModal("SLIP OF PAPER", p.sentence, p.logged ? "LOGGED." : "…", `(${p.posIndex})`);
    }
    if (!wantE) eLatch = false;
  }

  // ---------- Padlock ----------
  const codeInput = $("codeInput");
  const unlockBtn = $("unlockBtn");
  const lockStatus = $("lockStatus");

  function sanitizeCode(s){ return (s||"").replace(/\D/g,"").slice(0,4); }
  codeInput.addEventListener("input", () => codeInput.value = sanitizeCode(codeInput.value));

  const correctCode = "4123";

  function tryUnlock() {
    const entered = sanitizeCode(codeInput.value);
    if (entered.length < 4) {
      lockStatus.style.color = "var(--muted)";
      lockStatus.textContent = "STATUS: INCOMPLETE.";
      return;
    }
    if (entered === correctCode) {
      lockStatus.style.color = "var(--ok)";
      lockStatus.textContent = "STATUS: ACCEPTED.";
      codeInput.disabled = true;
      unlockBtn.disabled = true;

      openModal(
        "JOURNAL // ENTRY 17 (RECOVERED)",
        [
          "They were in the hallway again.",
          "",
          "Not students. Not staff.",
          "Same shoes. Same pace.",
          "Standing where nobody stands.",
          "",
          "I turned off my office light and waited.",
          "Their shadows stayed.",
          "",
          "This morning my email was already read.",
          "My door was already unlocked.",
          "My whiteboard was clean.",
          "",
          "They don't ask questions.",
          "They just collect answers.",
          "",
          "If you're reading this, you're close.",
          "Don't trust the quiet people.",
          "Don't trust the cameras that 'aren't on.'",
          "",
          "The tunnel ends in money.",
          "But the secret comes first."
        ].join("\n")
      );
    } else {
      lockStatus.style.color = "var(--bad)";
      lockStatus.textContent = "STATUS: REJECTED.";
    }
  }
  unlockBtn.addEventListener("click", tryUnlock);
  codeInput.addEventListener("keydown", (e) => { if (e.key === "Enter") tryUnlock(); });

  // ---------- Camera ----------
  function updateCamera() {
    cam.x = clamp(player.x - VIEW_W/2, 0, WORLD_W - VIEW_W);
    cam.y = clamp(player.y - VIEW_H/2, 0, WORLD_H - VIEW_H);
  }
  function worldToView(wx, wy) { return { x: wx - cam.x, y: wy - cam.y }; }

  // ---------- Draw ----------
  function drawBackground() {
    ctx.fillStyle = "#061016";
    ctx.fillRect(0,0,VIEW_W,VIEW_H);

    ctx.strokeStyle = "rgba(140,255,205,0.05)";
    for (let x = -(cam.x % 48); x < VIEW_W; x += 48) {
      ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,VIEW_H); ctx.stroke();
    }
    for (let y = -(cam.y % 48); y < VIEW_H; y += 48) {
      ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(VIEW_W,y); ctx.stroke();
    }
  }

  function drawObstacles() {
    for (const o of obstacles) {
      const v = worldToView(o.x, o.y);
      ctx.fillStyle = "rgba(12, 26, 26, 0.92)";
      ctx.fillRect(v.x, v.y, o.w, o.h);
      ctx.strokeStyle = "rgba(140,255,205,0.28)";
      ctx.strokeRect(v.x, v.y, o.w, o.h);

      ctx.fillStyle = "rgba(255,210,130,0.08)";
      ctx.fillRect(v.x + 6, v.y + 6, Math.min(42, o.w - 12), 4);
    }
  }

  function drawPapers() {
    for (const p of papers) {
      const v = worldToView(p.x, p.y);
      const w = 10, h = 8;
      const x = v.x - w/2, y = v.y - h/2;

      ctx.fillStyle = p.logged ? "rgba(245,245,235,0.35)" : "rgba(245,245,235,0.55)";
      ctx.fillRect(x, y, w, h);

      ctx.strokeStyle = "rgba(140,255,205,0.18)";
      ctx.strokeRect(x, y, w, h);

      ctx.font = "9px Courier New";
      ctx.fillStyle = "rgba(220,255,244,0.55)";
      ctx.fillText(String(p.posIndex), x + w - 5, y + h + 9);
    }
  }

  function drawPlayer() {
    const v = worldToView(player.x, player.y);
    ctx.strokeStyle = "rgba(150,255,190,0.95)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(v.x, v.y, player.r, 0, Math.PI*2);
    ctx.stroke();

    let fx=0, fy=0;
    if (keys.has("w")) fy -= 1;
    if (keys.has("s")) fy += 1;
    if (keys.has("a")) fx -= 1;
    if (keys.has("d")) fx += 1;
    if (fx === 0 && fy === 0) fy = -1;

    const len = 8;
    const mag = Math.max(1, Math.hypot(fx, fy));
    fx = (fx/mag)*len; fy = (fy/mag)*len;

    ctx.beginPath();
    ctx.moveTo(v.x, v.y);
    ctx.lineTo(v.x + fx, v.y + fy);
    ctx.stroke();
  }

  function drawInteractPrompt() {
    if (paused) return;
    const p = nearestPaperInRange();
    if (!p) return;
    const pv = worldToView(p.x, p.y);
    ctx.font = "14px Courier New";
    ctx.fillStyle = "rgba(255,210,130,0.92)";
    ctx.fillText("[E]", pv.x - 16, pv.y - 16);
  }

  function drawFlashlight() {
    const v = worldToView(player.x, player.y);
    const grd = ctx.createRadialGradient(v.x, v.y, 40, v.x, v.y, 210);
    grd.addColorStop(0, "rgba(0,0,0,0.0)");
    grd.addColorStop(0.55, "rgba(0,0,0,0.35)");
    grd.addColorStop(1, "rgba(0,0,0,0.78)");
    ctx.fillStyle = grd;
    ctx.fillRect(0,0,VIEW_W,VIEW_H);
  }

  // ---------- Loop ----------
  function update() {
    if (!paused) {
      let vx=0, vy=0;
      if (keys.has("w")) vy -= 1;
      if (keys.has("s")) vy += 1;
      if (keys.has("a")) vx -= 1;
      if (keys.has("d")) vx += 1;

      if (vx || vy) {
        const mag = Math.hypot(vx, vy);
        vx /= mag; vy /= mag;
        moveAndCollide(vx * player.speed, vy * player.speed);
      }
    }

    handleInteract();
    updateCamera();
  }

  function render() {
    drawBackground();
    drawObstacles();
    drawPapers();
    drawPlayer();
    drawInteractPrompt();
    drawFlashlight();
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();

  // Modal controls
  window.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modalBack.style.display === "block") closeModal();
  });
})();
</script>
</body>
</html>
